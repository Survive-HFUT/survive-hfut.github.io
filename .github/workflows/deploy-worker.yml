name: Deploy Worker (ongoing-webhook)

on:
  push:
    branches: [main]
    paths:
      - 'workers/ongoing-webhook/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Cloudflare Worker
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: workers/ongoing-webhook
          secrets: |
            GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.ONGOING_WEBHOOK_GITHUB_TOKEN }}

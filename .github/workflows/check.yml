name: check

on:
  push:
    paths:
      - '**/*.md'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'

      - name: Install dependencies and build site
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          pnpm install
          pnpm run docs:build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: './docs/.vitepress/dist'

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'

      - name: Install dependencies and run lint-md
        run: |
          pnpm install
          pnpm lint-md docs/**

      - name: Run markdownlint
        if: failure() || success()
        uses: DavidAnson/markdownlint-cli2-action@v23
